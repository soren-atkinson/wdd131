<!DOCTYPE html>
<html lang="en">
<head>                 
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->

    <meta property="og:title" content="JS Objects">
    <meta property="og:description" content="Can enroll students into cources">
    <meta property="og:url" content="https://yourURLofPage.here">

    <!-- Twitter Card -->

    <meta name="twitter:description" content="Put Page Description Here">

    <!-- One favicon (ICO works everywhere) -->

    <!-- One Apple Touch Icon (iOS home screen) -->

<body>  
    <h1 id="courseName"></h1>
    <h2 id="courseCode"></h2>
    <img>
    <form>
        <label for="sectionNumber">Section Number</label>
        <input id="sectionNumber" />
        <button type="button" id="enrollStudent">Enroll Student</button>
    </form>
    <table>
    <thead>
        <tr>
        <th>Section#</th>
        <th>Room#</th>
        <th>#Enrolled</th>
        <th>Days</th>
        <th>Instructor</th>
        </tr>
    </thead>
    <tbody id="sections"></tbody>
    </table>
