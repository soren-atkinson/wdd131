<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Objects</title>
    <script src="java.js" defer></script>
</head>
<body>  
    <h1 id="courseName"></h1>
    <h2 id="courseCode"></h2>
    <form>
        <label for="sectionNumber">Section Number</label>
        <input id="sectionNumber" />
        <button type="button" id="enrollStudent">Enroll Student</button>
    </form>
    <table>
    <thead>
        <tr>
        <th>Section#</th>
        <th>Room#</th>
        <th>#Enrolled</th>
        <th>Days</th>
        <th>Instructor</th>
        </tr>
    </thead>
    <tbody id="sections"></tbody>
    </table>
          
</body>
</html>
